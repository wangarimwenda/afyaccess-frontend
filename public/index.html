<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AfyAccess - Kenya Online Pharmacy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="nav">
            <div class="logo">AfyAccess</div>
            <nav>
                <a href="#" onclick="showPage('home')">Home</a>
                <a href="#" onclick="showPage('shop')">Shop</a>
                <a href="#" onclick="showPage('cart')">Cart (<span id="cart-count-header">0</span>)</a>
            </nav>
            <div style="display:flex; align-items:center; gap:15px;">
                <span onclick="handleUserClick()" style="cursor:pointer; font-weight:500;" id="user-info">Login</span>
                <div onclick="showPage('cart')" style="cursor:pointer; font-size:1.8rem;">🛒 <span id="cart-count">0</span></div>
            </div>
        </div>
    </header>

    <div id="home" class="page active hero">
        <h1>Your Health, Delivered Fast Across Kenya</h1>
        <p class="hero-subtitle">Licensed Online Pharmacy • Genuine Medicines • PPB Approved</p>
<button onclick="showPage('shop')" class="start-btn">Start Shopping</button>    </div>

    <div id="shop" class="page container">
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search medicines..." onkeyup="filterProducts()">
            <select id="classFilter" onchange="filterProducts()">
                <option value="">All Therapeutic Classifications</option>
            </select>
        </div>
        <div class="product-grid" id="productGrid"></div>
    </div>

    <div id="cart" class="page container">
        <h2>Your Cart</h2>
        <div id="cart-items"></div>
        <div class="cart-total" id="cart-total">Total: KSh 0</div>
        <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
        <p style="text-align:center; margin-top:15px; color:#666;">
            Customer Care: <strong>0790787574</strong>
        </p>
    </div>

    <!-- Login Modal -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Login to AfyAccess</h2>
            <input type="email" id="emailInput" placeholder="Email address" required>
            <input type="password" id="passwordInput" placeholder="Password" required>
            <button onclick="handleAuth()" id="authBtn">Login</button>
            <p id="authMessage" style="color:red; margin:10px 0;"></p>
            
            <p style="margin:15px 0;">
                <span onclick="toggleAuthMode()" id="toggleText" style="cursor:pointer; color:var(--primary);">Don't have an account? Sign Up</span>
            </p>
            <p onclick="forgotPassword()" style="cursor:pointer; color:#e11d48; text-align:center;">Forgot Password?</p>
            <button onclick="closeModal()" class="close-btn">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
