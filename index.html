<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AfyAccess - Kenya Online Pharmacy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <div class="nav">
            <div class="logo">AfyAccess</div>
            <nav>
                <a href="#" onclick="showPage('home')">Home</a>
                <a href="#" onclick="showPage('shop')">Shop</a>
                <a href="#" onclick="showPage('cart')">Cart (<span id="cart-count-header">0</span>)</a>
            </nav>
            <div style="display:flex; align-items:center; gap:15px;">
                <span onclick="handleUserClick()" style="cursor:pointer; font-weight:500;" id="user-info">Login</span>
                <div onclick="showPage('cart')" style="cursor:pointer; font-size:1.8rem;">🛒 <span id="cart-count">0</span></div>
            </div>
        </div>
    </header>

    <!-- HOME -->
    <div id="home" class="page active hero">
        <h1>Your Health, Delivered Fast Across Kenya</h1>
        <p class="hero-subtitle">Licensed Online Pharmacy • Genuine Medicines • Fast Delivery</p>
        <button onclick="showPage('shop')" class="start-btn">Start Shopping</button>
    </div>

    <!-- SHOP -->
    <div id="shop" class="page container">
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search medicines..." onkeyup="filterProducts()">
            <select id="classFilter" onchange="filterProducts()">
                <option value="">All Categories</option>
            </select>
        </div>
        <div class="product-grid" id="productGrid"></div>
    </div>

    <!-- CART -->
    <div id="cart" class="page container">
        <h2>Your Cart</h2>
        <div id="cart-items"></div>
        <div class="cart-total" id="cart-total">Total: KSh 0</div>
        <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
    </div>

    <!-- AUTH MODAL -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Login to AfyAccess</h2>
            <input type="email" id="emailInput" placeholder="Email address">
            <input type="password" id="passwordInput" placeholder="Password">
            <button onclick="handleAuth()" id="authBtn">Login</button>
            <p id="authMessage" style="color:red;"></p>
            <p style="margin:15px 0;">
                <span onclick="toggleAuthMode()" id="toggleText" style="cursor:pointer; color:#1e40af;">
                    Don't have an account? Sign Up
                </span>
            </p>
            <button onclick="closeModal()" class="close-btn">Close</button>
        </div>
    </div>

    <div id="checkoutModal" class="modal">
    <div class="modal-content">
        <h2>Checkout</h2>
        
        <input type="tel" id="checkoutPhone" placeholder="0712345678" required>
        <textarea id="checkoutAddress" placeholder="Delivery Address" required></textarea>

        <div style="margin:20px 0;">
            <button onclick="payWithMpesa()" style="background:#00A651; color:white; width:100%; padding:16px; border:none; border-radius:8px; font-size:1.1rem;">
                💰 Pay with M-Pesa
            </button>
        </div>

        <button onclick="closeCheckout()" class="close-btn">Cancel</button>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
